<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" type="text/css" href="/css/main.css?hash={{.Hash}}">
    <link rel="stylesheet" type="text/css" href="/css/landing.css?hash={{.Hash}}">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <meta name='impact-site-verification' value='77b54a05-53ed-42d4-b087-cb40fa950018' />
    <title>{{.Title}}</title>

    <link rel="apple-touch-icon" sizes="120x120" href="/img/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon/favicon-16x16.png">
    <link rel="manifest" href="/img/favicon/site.webmanifest">
    <link rel="mask-icon" href="/img/favicon/safari-pinned-tab.svg" color="#5bbad5">
    <link rel="shortcut icon" href="/img/favicon/favicon.ico">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="msapplication-config" content="/img/favicon/browserconfig.xml">
    <meta name="theme-color" content="#ff0000">

    <script type="text/javascript" src="/js/autocomplete.js?hash={{.Hash}}"></script>
    <script type="text/javascript" src="/js/fetchnames.js?hash={{.Hash}}"></script>
</head>

<body class="light-theme">
    {{template "navbar" .}}

    <div class="bg">
        <div class="mainbody">
            {{if .PatreonLogin}}
                <div class="indent">
                    <form class="search autocomplete" action="search" autocomplete="off" spellcheck="false" id="searchform">
                        <input id="searchbox" class="w3-input w3-border w3-round-small search-input" onFocus="this.setSelectionRange(0, this.value.length)" type="text" name="q" placeholder="Quick price check" maxlength="1000" autofocus autocapitalize="none">
                    </form>
                </div>

                <script type="text/javascript">
                    autocomplete(document.getElementById("searchform"), document.getElementById("searchbox"), "false");
                </script>
            {{end}}
        </div>
    </div>

    {{if ne .ErrorMessage ""}}
        <div class="landing-error">{{.ErrorMessage}}</div>
    {{end}}

    <div class="landing-footer">
        <div class="landing-divider"></div>

        <div class="landing-game-links">
            <a href="https://mtgban.com">Magic: the Gathering</a>
            <span>|</span>
            <a href="https://lorcana.mtgban.com">Disney Lorcana</a>
        </div>

        <div class="landing-login-row">
            {{if .PatreonLogin}}
                <script type="text/javascript">
                    function getPatreonURL(patreonId, client) {
                        return "http://www.patreon.com/oauth2/authorize?response_type=code&client_id=" + patreonId + "&redirect_uri={{$.PatreonURL}}&scope=identity%20identity%5Bemail%5D%20campaigns%20campaigns.members&state=" + encodeURIComponent(window.location.href + ";" + client);
                    }
                </script>
                {{range $ref, $id := .PatreonIds}}
                    <a class="landing-login-btn patreon" href="javascript:window.location = getPatreonURL('{{$id}}', '{{$ref}}')">&#9829; Patreon</a>
                    <noscript>
                        <a class="landing-login-btn patreon" href="http://www.patreon.com/oauth2/authorize?response_type=code&client_id={{$id}}&redirect_uri={{$.PatreonURL}}&scope=identity%20identity%5Bemail%5D%20campaigns%20campaigns.members&state=;{{$ref}}">
                            Patreon (no JS)
                        </a>
                    </noscript>
                {{end}}
                <a class="landing-login-btn discord" href="/discord">Discord</a>
            {{else}}
                <a class="landing-login-btn discord" href="/discord">Discord</a>
                <a class="landing-login-btn patreon" href="/?errmsg=logout">Logout</a>
            {{end}}
        </div>

        <div class="landing-copyright">&copy; 2019&ndash;2026 MTGBAN Inc</div>
    </div>
</div>

</body>
</html>
